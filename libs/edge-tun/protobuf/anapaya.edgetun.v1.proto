syntax = "proto3";

package anapaya.edgetun.v1;

// Request data plane configuration from the edge-tun server.
message GetDataPlaneConfigurationRequest {}

// Response containing data plane configuration.
message GetDataPlaneConfigurationResponse {
  // This address should be used for all further control plane requests.
  //
  // Example: "64-2:0:9b,[2001:db8:1234:5678::42]:5001"
  string control_plane_scion_sockaddr = 1;

  // The scion endhost socket address of the dataplane.
  // Example: "64-2:0:9b,[2001:db8:1234:5678::42]:8000"
  string data_plane_scion_sockaddr = 2;
}

// Request to register a static identity for an edgetun connection.
message RegisterEdgeTunIdentityRequest {
  // The static public key of the client.
  bytes initiator_static_x25519 = 1;
  // The client's pre-shared key. This can be either 32 bytes or all 0 bytes.
  bytes psk_share = 2;
}

// Response to a static identity registration request.
message RegisterEdgeTunIdentityResponse {
  // The static public key of the server.
  bytes responder_static_x25519 = 1;
  // The server's pre-shared key. This can be either 32 bytes or all 0 bytes.
  bytes psk_share = 2;
}

// Request to assign IP addresses.
message AddressAssignRequest {
  // Client's static identity.
  bytes client_identity = 1;
  // The requested IP address ranges.
  repeated IpAddressRange requested_addresses = 2;
}

// Response containing assigned IP address ranges.
message AddressAssignResponse {
  // The assigned address ranges.
  repeated IpAddressRange assigned_addresses = 1;
}

// Request advertised routes from the edge-tun server.
message RouteAdvertisementRequest {
  // Client's static identity.
  bytes client_identity = 1;
}

// Response containing advertised routes.
message RouteAdvertisementResponse {
  repeated IpAddressRange route = 1;
}

// An IP address range represented as network prefix.
message IpAddressRange {
  // Version MUST be either 4 or 6, indicating IPv4 or IPv6 respectively.
  uint32 version = 1;
  // The length of the network prefix. May not be larger than 32
  // for version = 4, and may not be larger than 128 for version = 6.
  uint32 prefix_length = 2;
  // The IP address in network format. The length of the address
  // must be 4 for version = 4 and 16 for version = 6.
  bytes address = 3;
}

name: Rust checks
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  workspace: .
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
"on":
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*'
      - .github/workflows/rust-checks.yml
jobs:
  tests:
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - windows-2025
    name: rust/tests
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Disk cleanup
        uses: ./.github/actions/disk-cleanup
      - name: Install NASM
        # NASM required for squiche on windows
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Setup protoc
        uses: ./.github/actions/setup-protoc
      - name: Restore the rust cache
        uses: ./.github/actions/rust-cache-restore
        with:
          workspace: ${{ env.workspace }}
      - name: Check generated protobuf files
        if: runner.os == 'Linux'
        run: cargo run -p proto-gen -- check
      - name: Run Rust checks
        uses: ./.github/actions/rust-checks
        with:
          workspace: ${{ env.workspace }}
      - name: Save the rust cache
        uses: ./.github/actions/rust-cache-save
        with:
          workspace: ${{ env.workspace }}

syntax = "proto3";

package anapaya.aa.v1;

// AuthService is the public-facing authentication endpoint for clients.
service AuthService {
  // AuthenticateByKey verifies an API key + device ID and returns a signed SNAP
  // token on success.
  rpc AuthenticateByKey(AuthenticateByKeyRequest) returns (AuthenticateByKeyResponse);
}

// Request to authenticate a client by API key.
message AuthenticateByKeyRequest {
  // The raw API key secret (prefixed with "aakey_").
  string api_key = 1;
  // Client-supplied device identifier.
  string device_id = 2;
  // Requested token TTL in seconds. 0 means "use the default" (3600).
  // Values below 900 and above 86400 are clamped to the nearest boundary.
  int32 requested_validity = 3;
}

// Response containing the signed SNAP token.
message AuthenticateByKeyResponse {
  // The signed JWT SNAP token.
  string snap_token = 1;
}
